        </nav>

    <main class="container">

        <section id="sec-register" class="glass-panel active">

                <button class="cat-btn" data-type="전문(단체)">전문(단체)</button>
                <button class="cat-btn" data-type="중고교">중고교</button>
            </div>

            <form id="registration-form" class="hidden">
                <input type="hidden" id="maker-category" name="category">
                
                <div class="form-grid" id="dynamic-fields-container">
                    <!-- Fields rendered dynamically -->
                </div>

                <div class="form-actions" style="grid-column: 1 / -1; margin-top: 2rem;">
                    <button type="submit" class="btn-primary" style="width: 100%;">신청 등록</button>
                </div>
            </form>
        </section>

        <!-- Section: Dashboard -->
        <section id="sec-dashboard" class="glass-panel hidden">
            <div class="dashboard-header">
                <h2>신청 데이터 확인</h2>
                <div style="display: flex; gap: 1rem;">

                    <button id="btn-add-field" class="btn-secondary">+ 구분 추가 (항목 추가)</button>
                </div>
            </div>

            <div id="add-field-modal" class="hidden glass-card modal">
                <h3>새로운 입력 항목 추가</h3>
                <div class="input-group">
                    <label>적용할 메이커 구분</label>
                    <select id="new-field-category">
                        <option value="모든 구분">모든 구분 (공통)</option>
                        <option value="개인">개인</option>
                        <option value="공방">공방</option>
                        <option value="전문(단체)">전문(단체)</option>
                        <option value="중고교">중고교</option>

                <div class="input-group">
                    <label>항목 식별자 (영어, 예: extraReq)</label>
                    <input type="text" id="new-field-id" placeholder="영문 식별자 입력">
                </div>
                <div class="input-group">
                    <label>표시 이름 (예: 추가 요구 사항, 전기 사용량)</label>

        } catch (error) {
            console.error("Firebase initialization error:", error);
        }

        async function addRegistration(data) {
            if (isFirebaseInitialized) {
                try {
                    const docRef = await addDoc(collection(db, "registrations"), data);
                    return docRef.id;
                } catch (e) {
                    console.error("Error adding document: ", e);
                    throw e;
                }
            } else {
                const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
                data.id = Date.now().toString();
                regs.push(data);
                localStorage.setItem('registrations', JSON.stringify(regs));
                return data.id;
            }
        }

        async function getRegistrations() {
            if (isFirebaseInitialized) {
                const querySnapshot = await getDocs(collection(db, "registrations"));
                return querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } else {
                return JSON.parse(localStorage.getItem('registrations') || '[]');
            }
        }

        async function saveCustomFields(fields) {
            if (isFirebaseInitialized) {
                await setDoc(doc(db, "settings", "formFields"), { fields });
            } else {
                localStorage.setItem('customFields', JSON.stringify(fields));
            }
        }

        async function getCustomFields() {
            if (isFirebaseInitialized) {
                try {
                    const querySnapshot = await getDocs(collection(db, "settings"));
                    let fields = [];
                    querySnapshot.forEach(doc => {
                        if (doc.id === 'formFields') fields = doc.data().fields;
                    });
                    return fields;
                } catch(e) { return []; }
            } else {
                return JSON.parse(localStorage.getItem('customFields') || '[]');
            }
        }

                { section: '운영 관련 사항', id: 'electricityCapacity', label: '전기 희망 용량(W)', type: 'text', required: true, showIf: { field: 'electricity', value: '희망' } },
                { section: '운영 관련 사항', id: 'boothOpType', label: '부스 운영방법', type: 'select', options: ['선택하세요', '체험없이 판매', '무료체험 및 판매', '유료체험 및 판매'], required: true },
                
                { section: '지원사항(선택)', id: 'lunchCount', label: '중식인원(명)', type: 'number', required: false },
                { section: '지원사항(선택)', id: 'tshirtBuy', label: '티셔츠 구매희망여부', type: 'select', options: ['선택하세요', 'N', 'Y'], required: false },
                { section: '지원사항(선택)', id: 'tshirtCount', label: '티셔츠 구매 희망 수량(장)', type: 'number', required: false, showIf: { field: 'tshirtBuy', value: 'Y' } }
            ]
        };

        // --- State ---
        let registrations = [];
        let customFields = [];
        let currentCategory = '';
        
        // Default visible columns in dashboard (basic ones)
        let visibleColumns = new Set(['category', 'name', 'phone', 'mainProjectName', 'opLocation']);

        function getAllUniqueFields(categoryFilter = '전체') {
            const map = new Map();
            if (categoryFilter !== '전체') {
                const schema = SCHEMAS[categoryFilter] || [];
                schema.forEach(field => map.set(field.id, { id: field.id, label: field.label, type: field.type }));
                customFields.forEach(f => {
                   if (!f.targetCategory || f.targetCategory === '모든 구분' || f.targetCategory === categoryFilter) {
                       if (!map.has(f.id)) map.set(f.id, f);
                   }
                });
            } else {
                Object.values(SCHEMAS).forEach(schema => {
                    schema.forEach(field => {
                        if (!map.has(field.id)) {
                            map.set(field.id, { id: field.id, label: field.label, type: field.type });
                        }
                    });
                });
                customFields.forEach(field => {
                    if (!map.has(field.id)) map.set(field.id, field);
                });
            }
            return Array.from(map.values());
        }

        // --- DOM Elements ---
        const navRegister = document.getElementById('nav-register');
        const navDashboard = document.getElementById('nav-dashboard');
        const secRegister = document.getElementById('sec-register');
        const secDashboard = document.getElementById('sec-dashboard');
        const catBtns = document.querySelectorAll('.cat-btn');
        const regForm = document.getElementById('registration-form');
        const categoryInput = document.getElementById('maker-category');
        const dynamicFieldsContainer = document.getElementById('dynamic-fields-container');
        const btnAddField = document.getElementById('btn-add-field');
        const addFieldModal = document.getElementById('add-field-modal');
        const btnConfirmAddField = document.getElementById('btn-confirm-add-field');
        const btnCancelAddField = document.getElementById('btn-cancel-add-field');
        const tableHeadRow = document.getElementById('table-head-row');
        const tableBody = document.getElementById('table-body');
        const statsContainer = document.getElementById('stats-container');
        const columnToggles = document.getElementById('column-toggles');

        // --- Initialization ---
        async function init() {
            customFields = await getCustomFields();
            customFields.forEach(f => visibleColumns.add(f.id));
        }

        // --- Navigation ---
        navRegister.addEventListener('click', () => {
            navRegister.classList.add('active');
            navDashboard.classList.remove('active');
            secRegister.classList.remove('hidden');
            secDashboard.classList.add('hidden');
        });

        navDashboard.addEventListener('click', async () => {
            navDashboard.classList.add('active');
            navRegister.classList.remove('active');
            secDashboard.classList.remove('hidden');
            secRegister.classList.add('hidden');
            await refreshDashboard();
        });

        // --- Category Selection ---
        catBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                catBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                currentCategory = btn.dataset.type;
                categoryInput.value = currentCategory;
                
                renderFormFields(currentCategory);
                regForm.classList.remove('hidden');
                
                regForm.style.animation = 'none';
                setTimeout(() => regForm.style.animation = 'fadeIn 0.5s ease forwards', 10);
            });
        });

        // --- Dynamic Form Rendering ---
        function renderFormFields(category) {
            dynamicFieldsContainer.innerHTML = '';
            const schema = SCHEMAS[category] || [];
            const filteredCustomFields = customFields.filter(f => !f.targetCategory || f.targetCategory === '모든 구분' || f.targetCategory === category);
            const allFieldsForCategory = [...schema, ...filteredCustomFields];

            let currentSection = '';
            let currentRowGroup = null;
            let rowGroupDiv = null;

            allFieldsForCategory.forEach(field => {
                if (field.section && field.section !== currentSection) {
                    const secHeader = document.createElement('div');
                    secHeader.classList.add('form-section-header');
                    secHeader.textContent = field.section;
                    secHeader.dataset.sectionName = field.section;
                    dynamicFieldsContainer.appendChild(secHeader);
                    currentSection = field.section;
                    currentRowGroup = null;
                }

                const group = document.createElement('div');
                group.classList.add('input-group');
                group.dataset.fieldId = field.id;
                group.dataset.sectionName = field.section;
                
                if (field.showIf) {
                    group.classList.add('hidden');
                }

                const label = document.createElement('label');
                label.htmlFor = `input-${field.id}`;
                label.textContent = field.label + (field.required ? ' *' : '');
                
                let input;
                if (field.type === 'select') {
                    input = document.createElement('select');
                    field.options.forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt === '선택하세요' ? '' : opt;
                        option.textContent = opt;
                        input.appendChild(option);
                    });
                } else if (field.type === 'textarea') {
                    input = document.createElement('textarea');
                } else {
                    input = document.createElement('input');
                    input.type = field.type;
                    if(field.type === 'number') input.min = 0;
                }
                
                input.id = `input-${field.id}`;
                input.name = field.id;
                
                if (field.required && !field.showIf) input.required = true;
                
                // Add listener to all inputs to evaluate conditional logic
                input.addEventListener('change', () => evaluateConditions(allFieldsForCategory));
                input.addEventListener('input', () => evaluateConditions(allFieldsForCategory));

                group.appendChild(label);
                group.appendChild(input);
                
                if (field.rowGroup) {
                    if (currentRowGroup !== field.rowGroup) {
                        rowGroupDiv = document.createElement('div');
                        rowGroupDiv.classList.add('row-group-container');
                        dynamicFieldsContainer.appendChild(rowGroupDiv);
                        currentRowGroup = field.rowGroup;
                    }
                    rowGroupDiv.appendChild(group);
                } else {
                    currentRowGroup = null;
                    dynamicFieldsContainer.appendChild(group);
                }
            });
            
            // initial check for conditionals
            evaluateConditions(allFieldsForCategory);
        }

        function evaluateConditions(schema) {
            schema.forEach(field => {
                if (field.showIf) {
                    const dependencyInput = document.getElementById(`input-${field.showIf.field}`);
                    const targetGroup = document.querySelector(`.input-group[data-field-id="${field.id}"]`);
                    const targetInput = document.getElementById(`input-${field.id}`);
                    
                    if (dependencyInput && targetGroup) {
                        let isMatch = false;
                        if (Array.isArray(field.showIf.value)) {
                            isMatch = field.showIf.value.includes(dependencyInput.value);
                        } else {
                            isMatch = dependencyInput.value === field.showIf.value;
                        }

                        if (isMatch) {
                            targetGroup.classList.remove('hidden');
                            if (field.required) targetInput.required = true;
                        } else {
                            targetGroup.classList.add('hidden');
                            targetInput.required = false;
                            targetInput.value = ''; // clear value
                        }
                    }
                }
            });

            // Update section header visibility based on child input groups
            const headers = document.querySelectorAll('.form-section-header');
            headers.forEach(header => {
                const sectionName = header.dataset.sectionName;
                if (sectionName) {
                    const groups = document.querySelectorAll(`.input-group[data-section-name="${sectionName}"]`);
                    let isAnyVisible = false;
                    groups.forEach(group => {
                        if (!group.classList.contains('hidden')) {
                            isAnyVisible = true;
                        }
                    });
                    header.style.display = isAnyVisible ? 'block' : 'none';
                }
            });
        }

        // --- Form Submission ---
        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(regForm);
            const data = Object.fromEntries(formData.entries());
            
            const schema = SCHEMAS[data.category] || [];
            const filteredCustomFields = customFields.filter(f => !f.targetCategory || f.targetCategory === '모든 구분' || f.targetCategory === data.category);
            const allFieldsForCategory = [...schema, ...filteredCustomFields];

            allFieldsForCategory.forEach(f => {
                if(f.type === 'number' && data[f.id]) {
                    data[f.id] = parseInt(data[f.id], 10);
                }
            });

            data.timestamp = Date.now();
            const submitBtn = regForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '처리 중...';
            submitBtn.disabled = true;

            try {
                await addRegistration(data);
                alert('성공적으로 등록되었습니다!');
                regForm.reset();
                catBtns.forEach(b => b.classList.remove('selected'));
                regForm.classList.add('hidden');
                currentCategory = '';
            } catch (err) {
                alert('등록 중 오류가 발생했습니다.');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // --- Dashboard ---
        async function refreshDashboard() {
            registrations = await getRegistrations();
            
            const filterSelect = document.getElementById('dashboard-category-filter');
            if (filterSelect && !filterSelect.hasAttribute('data-bound')) {
                filterSelect.addEventListener('change', () => {
                    renderColumnToggles();
                    renderStats();
                    renderTable();
                });
                filterSelect.setAttribute('data-bound', 'true');
            }

            renderColumnToggles();
            renderStats();
            renderTable();
        }

        function renderColumnToggles() {
            columnToggles.innerHTML = '';
            const categoryFilter = document.getElementById('dashboard-category-filter') ? document.getElementById('dashboard-category-filter').value : '전체';
            const allFields = getAllUniqueFields(categoryFilter);
            
            const toggleItems = [];
            const processedFields = new Set();
            const all = [{id: 'category', label: '메이커 구분'}, ...allFields];

            all.forEach(field => {
                if (processedFields.has(field.id)) return;
                
                const group = TOGGLE_GROUPS.find(g => g.fields.includes(field.id));
                if (group) {
                    toggleItems.push({ isGroup: true, label: group.label, fields: group.fields });
                    group.fields.forEach(fid => processedFields.add(fid));
                } else {
                    toggleItems.push({ isGroup: false, id: field.id, label: field.label });
                    processedFields.add(field.id);
                }
            });
            
            toggleItems.forEach(item => {
                const label = document.createElement('label');
                label.classList.add('checkbox-label');
                
                let isChecked = false;
                if (item.isGroup) {
                    isChecked = item.fields.every(fid => visibleColumns.has(fid));
                } else {
                    isChecked = visibleColumns.has(item.id);
                }
                
                if (isChecked) label.classList.add('active-filter');
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = isChecked;
                
                checkbox.addEventListener('change', (e) => {
                    if (item.isGroup) {
                        item.fields.forEach(fid => {
                            if (e.target.checked) visibleColumns.add(fid);
                            else visibleColumns.delete(fid);
                        });
                    } else {
                        if (e.target.checked) visibleColumns.add(item.id);
                        else visibleColumns.delete(item.id);
                    }
                    
                    if (e.target.checked) label.classList.add('active-filter');
                    else label.classList.remove('active-filter');
                    
                    renderTable();
                });
                
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(' ' + item.label));
                columnToggles.appendChild(label);
            });
        }

        function renderStats() {
            statsContainer.innerHTML = '';
            const categoryFilter = document.getElementById('dashboard-category-filter') ? document.getElementById('dashboard-category-filter').value : '전체';
            const allFields = getAllUniqueFields(categoryFilter);
            const numberFields = allFields.filter(f => f.type === 'number');
            
            let displayRegs = registrations;
            if (categoryFilter !== '전체') {
                displayRegs = displayRegs.filter(r => r.category === categoryFilter);
            }
            
            createStatCard('전체 등록 수', displayRegs.length + '팀');
            
            numberFields.forEach(field => {
                const total = displayRegs.reduce((sum, reg) => sum + (Number(reg[field.id]) || 0), 0);
                if(total > 0) {
                    createStatCard(field.label, total);
                }
            });
        }

        function createStatCard(label, value) {
            const card = document.createElement('div');
            card.classList.add('stat-card');
            card.innerHTML = `<div class="stat-value">${value}</div><div class="stat-label">${label}</div>`;
            statsContainer.appendChild(card);
        }

        function renderTable() {
            tableHeadRow.innerHTML = '';
            tableBody.innerHTML = '';
            
            const categoryFilter = document.getElementById('dashboard-category-filter') ? document.getElementById('dashboard-category-filter').value : '전체';
            const allFields = getAllUniqueFields(categoryFilter);
            const all = [{id: 'category', label: '메이커 구분'}, ...allFields];
            const activeFields = all.filter(f => visibleColumns.has(f.id));
            
            activeFields.forEach(f => {
                const th = document.createElement('th');
                th.textContent = f.label;
                tableHeadRow.appendChild(th);
            });
            
            let displayRegs = registrations;
            if (categoryFilter !== '전체') {
                displayRegs = displayRegs.filter(r => r.category === categoryFilter);
            }
            
            displayRegs.forEach(reg => {
                const tr = document.createElement('tr');
                activeFields.forEach(f => {
                    const td = document.createElement('td');
                    td.textContent = reg[f.id] || '-';
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
        }

        // --- Add Custom Field Modal ---
        btnAddField.addEventListener('click', () => {
            addFieldModal.classList.remove('hidden');
        });

        btnCancelAddField.addEventListener('click', () => {
            addFieldModal.classList.add('hidden');
            document.getElementById('new-field-id').value = '';
            document.getElementById('new-field-name').value = '';
            document.getElementById('new-field-category').value = '모든 구분';
        });

        btnConfirmAddField.addEventListener('click', async () => {
            const targetCategory = document.getElementById('new-field-category').value;
            const idInput = document.getElementById('new-field-id').value.trim();
            const nameInput = document.getElementById('new-field-name').value.trim();
            const typeInput = document.getElementById('new-field-type').value;
            
            if(!idInput || !nameInput) {
                alert('식별자와 항목 이름을 모두 입력해주세요.');
                return;
            }
            
            const newField = { targetCategory: targetCategory, section: '추가 항목', id: idInput, label: nameInput, type: typeInput, required: false };
            customFields.push(newField);
            await saveCustomFields(customFields);
            
            visibleColumns.add(idInput);
            if (currentCategory) {
                renderFormFields(currentCategory);
            }
            
            if (!secDashboard.classList.contains('hidden')) {
                await refreshDashboard();
            }
            btnCancelAddField.click();
        });

        // --- Excel Export ---
        const btnExportExcel = document.getElementById('btn-export-excel');
        btnExportExcel.addEventListener('click', () => {
            if (registrations.length === 0) {
                alert('다운로드할 데이터가 없습니다.');
                return;
            }
            
            const categoryFilter = document.getElementById('dashboard-category-filter') ? document.getElementById('dashboard-category-filter').value : '전체';
            const allFields = getAllUniqueFields(categoryFilter);
            
            let displayRegs = registrations;
            if (categoryFilter !== '전체') {
                displayRegs = displayRegs.filter(r => r.category === categoryFilter);
            }

            const activeFields = allFields.filter(f => visibleColumns.has(f.id));
            const headers = ['메이커 구분', ...activeFields.map(f => f.label)];
            const keys = ['category', ...activeFields.map(f => f.id)];
            
            const dataToExport = displayRegs.map(reg => {
                const row = {};
                keys.forEach((key, index) => {
                    row[headers[index]] = reg[key] || '';
                });
                return row;
            });
            
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "신청자목록");
            XLSX.writeFile(wb, "hellomaker_registrations.xlsx");
        });

        init();
    </script>
</body>
</html>
