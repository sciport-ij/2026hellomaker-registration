    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var authScreen = document.getElementById('auth-screen');
            var appContent = document.getElementById('app-content');
            var authPasswordInput = document.getElementById('auth-password');
            var btnAuthSubmit = document.getElementById('btn-auth-submit');
            var authError = document.getElementById('auth-error');

            var isAuthenticated = false;
            try {
                isAuthenticated = sessionStorage.getItem('isAuthenticated') === 'true';
            } catch (e) {
                console.warn("sessionStorage not available", e);
            }

            if (isAuthenticated) {
                authScreen.style.display = 'none';
                appContent.style.display = 'block';
            }

            btnAuthSubmit.addEventListener('click', function() {
                if (authPasswordInput.value.trim() === 'sciport1!') {
                    try {
                        sessionStorage.setItem('isAuthenticated', 'true');
                    } catch (e) {}
                    authScreen.style.display = 'none';
                    appContent.style.display = 'block';
                } else {
                    authError.style.display = 'block';
                    authPasswordInput.value = '';
                    authPasswordInput.focus();
                }
            });

            authPasswordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    btnAuthSubmit.click();
                }
            });
        });
    </script>

        let app, db;
        let isFirebaseInitialized = false;

        try {
            if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                isFirebaseInitialized = true;
                console.log("Firebase initialized successfully.");
            } else {
                console.warn("Firebase config is missing. Falling back to LocalStorage for demonstration.");
            }
        } catch (error) {
            console.error("Firebase initialization error:", error);
        }

        function withTimeout(promise, ms = 8000) {
            return Promise.race([
                promise,
                new Promise((_, reject) => setTimeout(() => reject(new Error("네트워크 응답 시간 초과 (서버 연결 실패)")), ms))
            ]);
        }

        async function addRegistration(data) {
            if (isFirebaseInitialized) {
                try {
                    const docRef = await withTimeout(addDoc(collection(db, "registrations"), data));
                    return docRef.id;
                } catch (e) {
                    console.error("Error adding document: ", e);
                    throw e;
                }
            } else {
                const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
                data.id = Date.now().toString();
                regs.push(data);
                localStorage.setItem('registrations', JSON.stringify(regs));
                return data.id;
            }
        }

        async function getRegistrations() {
            if (isFirebaseInitialized) {
                try {
                    const querySnapshot = await withTimeout(getDocs(collection(db, "registrations")));
                    return querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (e) {
                    console.error("Error getting docs: ", e);
                    throw e;
                }
            } else {
                return JSON.parse(localStorage.getItem('registrations') || '[]');
            }
        }

        async function updateRegistration(id, data) {
            if (isFirebaseInitialized) {
                try {
                    const docRef = doc(db, "registrations", id);
                    await withTimeout(updateDoc(docRef, data));
                } catch (e) {
                    console.error("Error updating doc: ", e);
                    throw e;
                }
            } else {
                const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
                const index = regs.findIndex(r => r.id === id);
                if (index > -1) {
                    regs[index] = { ...regs[index], ...data };
                    localStorage.setItem('registrations', JSON.stringify(regs));
                }
            }
        }

        async function deleteRegistration(id) {
            if (isFirebaseInitialized) {
                try {
                    const docRef = doc(db, "registrations", id);
                    await withTimeout(deleteDoc(docRef));
                } catch (e) {
                    console.error("Error deleting doc: ", e);
                    throw e;
                }
            } else {
                let regs = JSON.parse(localStorage.getItem('registrations') || '[]');
                regs = regs.filter(r => r.id !== id);
                localStorage.setItem('registrations', JSON.stringify(regs));
            }
        }

        async function saveCustomFields(fields) {
            if (isFirebaseInitialized) {
                await setDoc(doc(db, "settings", "formFields"), { fields });
            } else {
                localStorage.setItem('customFields', JSON.stringify(fields));
            }
        }

        async function getCustomFields() {
            if (isFirebaseInitialized) {
                try {
                    const querySnapshot = await getDocs(collection(db, "settings"));
                    let fields = [];
                    querySnapshot.forEach(doc => {
                        if (doc.id === 'formFields') fields = doc.data().fields;
                    });
                    return fields;
                } catch(e) { return []; }
            } else {
                return JSON.parse(localStorage.getItem('customFields') || '[]');
            }
        }

        // --- State ---

        function getAllUniqueFields(categoryFilter = '전체') {
            const map = new Map();
            if (categoryFilter !== '전체') {
                const schema = SCHEMAS[categoryFilter] || [];
                schema.forEach(field => map.set(field.id, { id: field.id, label: field.label, type: field.type }));
                customFields.forEach(f => {
                   if (!f.targetCategory || f.targetCategory === '모든 구분' || f.targetCategory === categoryFilter) {
                       if (!map.has(f.id)) map.set(f.id, f);
                   }
                });
            } else {
                Object.values(SCHEMAS).forEach(schema => {
                    schema.forEach(field => {
                        if (!map.has(field.id)) {
                            map.set(field.id, { id: field.id, label: field.label, type: field.type });
                        }
                    });
                });
                customFields.forEach(field => {
                    if (!map.has(field.id)) map.set(field.id, field);
                });
            }
            return Array.from(map.values());
        }

        // --- Dynamic Form Rendering ---
        function renderFormFields(category) {
            dynamicFieldsContainer.innerHTML = '';
            const schema = SCHEMAS[category] || [];
            const filteredCustomFields = customFields.filter(f => !f.targetCategory || f.targetCategory === '모든 구분' || f.targetCategory === category);
            const allFieldsForCategory = [...schema, ...filteredCustomFields];

            let currentSection = '';
            let currentRowGroup = null;
            let rowGroupDiv = null;

            allFieldsForCategory.forEach(field => {
                if (field.section && field.section !== currentSection) {
                    const secHeader = document.createElement('div');
                    secHeader.classList.add('form-section-header');
                    secHeader.textContent = field.section;
                    secHeader.dataset.sectionName = field.section;
                    dynamicFieldsContainer.appendChild(secHeader);
                    currentSection = field.section;
                    currentRowGroup = null;
                }

                const group = document.createElement('div');
                group.classList.add('input-group');
                group.dataset.fieldId = field.id;
                group.dataset.sectionName = field.section;
                
                if (field.showIf) {
                    group.classList.add('hidden');
                }

                const label = document.createElement('label');
                label.htmlFor = `input-${field.id}`;
                label.textContent = field.label + (field.required ? ' *' : '');
                
                let input;
                if (field.type === 'select') {
                    input = document.createElement('select');
                    field.options.forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt === '선택하세요' ? '' : opt;
                        option.textContent = opt;
                        input.appendChild(option);
                    });
                } else if (field.type === 'textarea') {
                    input = document.createElement('textarea');
                } else if (field.type === 'checkbox') {
                    input = document.createElement('input');
                    input.type = 'checkbox';
                    input.value = 'Y';
                    group.style.flexDirection = 'row';
                    group.style.alignItems = 'center';
                } else {
                    input = document.createElement('input');
                    input.type = field.type;
                    if(field.type === 'number') input.min = 0;
                }
                
                input.id = `input-${field.id}`;
                input.name = field.id;
                
                if (field.required && !field.showIf) input.required = true;
                
                // Add listener to all inputs to evaluate conditional logic
                input.addEventListener('change', () => evaluateConditions(allFieldsForCategory));
                input.addEventListener('input', () => evaluateConditions(allFieldsForCategory));

                group.appendChild(label);
                group.appendChild(input);
                
                if (field.rowGroup) {
                    if (currentRowGroup !== field.rowGroup) {
                        rowGroupDiv = document.createElement('div');
                        rowGroupDiv.classList.add('row-group-container');
                        dynamicFieldsContainer.appendChild(rowGroupDiv);
                        currentRowGroup = field.rowGroup;
                    }
                    rowGroupDiv.appendChild(group);
                } else {
                    currentRowGroup = null;
                    dynamicFieldsContainer.appendChild(group);
                }
            });
            
            // initial check for conditionals
            evaluateConditions(allFieldsForCategory);
        }

        function evaluateConditions(schema) {
            schema.forEach(field => {
                if (field.showIf) {
                    const dependencyInput = document.getElementById(`input-${field.showIf.field}`);
                    const targetGroup = document.querySelector(`.input-group[data-field-id="${field.id}"]`);
                    const targetInput = document.getElementById(`input-${field.id}`);
                    
                    if (dependencyInput && targetGroup) {
                        let isMatch = false;
                        if (Array.isArray(field.showIf.value)) {
                            isMatch = field.showIf.value.includes(dependencyInput.value);
                        } else {
                            isMatch = dependencyInput.value === field.showIf.value;
                        }

                        if (isMatch) {
                            targetGroup.classList.remove('hidden');
                            if (field.required) targetInput.required = true;
                        } else {
                            targetGroup.classList.add('hidden');
                            targetInput.required = false;
                            targetInput.value = ''; // clear value
                        }
                    }
                }
            });

            // Update section header visibility based on child input groups
            const headers = document.querySelectorAll('.form-section-header');
            headers.forEach(header => {
                const sectionName = header.dataset.sectionName;
                if (sectionName) {
                    const groups = document.querySelectorAll(`.input-group[data-section-name="${sectionName}"]`);
                    let isAnyVisible = false;
                    groups.forEach(group => {
                        if (!group.classList.contains('hidden')) {
                            isAnyVisible = true;
                        }
                    });
                    header.style.display = isAnyVisible ? 'block' : 'none';
                }
            });
        }

        // --- Form Submission ---

            const filteredCustomFields = customFields.filter(f => !f.targetCategory || f.targetCategory === '모든 구분' || f.targetCategory === data.category);
            const allFieldsForCategory = [...schema, ...filteredCustomFields];

            allFieldsForCategory.forEach(f => {
                if (f.type === 'checkbox') {
                    data[f.id] = formData.has(f.id) ? 'Y' : 'N';
                } else if (f.type === 'number' && data[f.id]) {
                    data[f.id] = parseInt(data[f.id], 10);
                }
            });

            data.timestamp = Date.now();
            data.status = '미정';
            const submitBtn = regForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '처리 중...';
            submitBtn.disabled = true;

            try {
                await addRegistration(data);
                alert('성공적으로 등록되었습니다!');
                regForm.reset();
                catBtns.forEach(b => b.classList.remove('selected'));

                alert('등록 중 오류가 발생했습니다: ' + (err.message || '알 수 없는 오류'));
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

            registrations = await getRegistrations();

        function renderColumnToggles() {
            columnToggles.innerHTML = '';
            const categoryFilter = document.getElementById('dashboard-category-filter') ? document.getElementById('dashboard-category-filter').value : '전체';
            const allFields = getAllUniqueFields(categoryFilter);
            
            const toggleItems = [];
            const processedFields = new Set();
            const all = [{id: 'category', label: '메이커 구분'}, ...allFields];

            all.forEach(field => {
                if (processedFields.has(field.id)) return;
                
                const group = TOGGLE_GROUPS.find(g => g.fields.includes(field.id));
                if (group) {
                    toggleItems.push({ isGroup: true, label: group.label, fields: group.fields });
                    group.fields.forEach(fid => processedFields.add(fid));
                } else {
                    toggleItems.push({ isGroup: false, id: field.id, label: field.label });
                    processedFields.add(field.id);
                }
            });
            
            toggleItems.forEach(item => {
                const label = document.createElement('label');
                label.classList.add('checkbox-label');
                
                let isChecked = false;
                if (item.isGroup) {
                    isChecked = item.fields.every(fid => visibleColumns.has(fid));
                } else {
                    isChecked = visibleColumns.has(item.id);
                }
                
                if (isChecked) label.classList.add('active-filter');
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = isChecked;
                
                checkbox.addEventListener('change', (e) => {
                    if (item.isGroup) {
                        item.fields.forEach(fid => {
                            if (e.target.checked) visibleColumns.add(fid);
                            else visibleColumns.delete(fid);
                        });
                    } else {
                        if (e.target.checked) visibleColumns.add(item.id);
                        else visibleColumns.delete(item.id);
                    }
                    
                    if (e.target.checked) label.classList.add('active-filter');
                    else label.classList.remove('active-filter');
                    
                    renderTable();
                });
                
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(' ' + item.label));
                columnToggles.appendChild(label);
            });
        }

        function formatNumber(num) {
            if (num === null || num === undefined) return '';
            if (typeof num === 'number') return num.toLocaleString();
            if (typeof num === 'string' && !isNaN(Number(num)) && num.trim() !== '') {
                return Number(num).toLocaleString();
            }
            return num;
        }

            const greemerRegs = displayRegs.filter(r => r.greemerCast === 'Y');
            const greemerBreakdown = {
                '개인': greemerRegs.filter(r => r.category === '개인').length,
                '공방': greemerRegs.filter(r => r.category === '공방').length,
                '전문(단체)': greemerRegs.filter(r => r.category === '전문(단체)').length,

            createStatCard('그리머 섭외건', formatNumber(greemerRegs.length) + '건', false, greemerBreakdown);
            
            // 3. 테이블 수량
            const tableCount = displayRegs.reduce((sum, r) => sum + (Number(r.tableCount) || 0), 0);
            createStatCard('테이블 수량(개)', formatNumber(tableCount));

            // 4. 의자 수량
            const chairCount = displayRegs.reduce((sum, r) => sum + (Number(r.chairCount) || 0), 0);
            createStatCard('의자 수량(개)', formatNumber(chairCount));

            // 5. 중식인원
            const lunchCount = displayRegs.reduce((sum, r) => sum + (Number(r.lunchCount) || 0), 0);
            createStatCard('중식인원(명)', formatNumber(lunchCount));

            // 6. 단체복 수량(전체합계)
            const uniformBreakdown = {
                'XS': displayRegs.reduce((sum, r) => sum + (Number(r.uniformCount_XS) || 0), 0),
                'S': displayRegs.reduce((sum, r) => sum + (Number(r.uniformCount_S) || 0), 0),
                'M': displayRegs.reduce((sum, r) => sum + (Number(r.uniformCount_M) || 0), 0),
                'L': displayRegs.reduce((sum, r) => sum + (Number(r.uniformCount_L) || 0), 0),
                'XL': displayRegs.reduce((sum, r) => sum + (Number(r.uniformCount_XL) || 0), 0),
                '2XL': displayRegs.reduce((sum, r) => sum + (Number(r.uniformCount_2XL) || 0), 0),
                '3XL': displayRegs.reduce((sum, r) => sum + (Number(r.uniformCount_3XL) || 0), 0)
            };
            const uniformSum = Object.values(uniformBreakdown).reduce((a, b) => a + b, 0);
            createStatCard('단체복 수량(전체)', formatNumber(uniformSum), false, uniformBreakdown);

            // 7. 교통비
            const transportCost = displayRegs.reduce((sum, r) => sum + (Number(r.transportCost) || 0), 0);
            createStatCard('교통비(예상금액)', formatNumber(transportCost) + '원', true);

            // 8. 네트워크 파티 인원
            const partyCount = displayRegs.reduce((sum, r) => sum + (Number(r.networkPartyCount) || 0), 0);
            createStatCard('네트워크 파티 인원(명)', formatNumber(partyCount));
        }

        function createStatCard(label, value, isLargeNumber = false, detailData = null) {
            const card = document.createElement('div');
            card.classList.add('stat-card');
            card.style.position = 'relative';
            
            if (detailData) {
                card.style.cursor = 'pointer';
                card.title = '자세한 내용을 보려면 클릭해 주세요';
                
                const popover = document.createElement('div');
                popover.classList.add('stat-popover', 'hidden');
                
                let popoverHtml = `<h4 style="margin-bottom: 0.8rem; color: var(--primary); font-size: 1rem; text-align: left;">${label} 상세</h4>`;
                for (const [k, v] of Object.entries(detailData)) {
                    popoverHtml += `
                        <div class="stat-popover-item">
                            <span style="color: var(--text-muted); font-size: 0.95rem;">${k}</span>
                            <span style="font-weight: bold; color: var(--text-main); font-size: 1.1rem;">${formatNumber(v)}</span>
                        </div>
                    `;
                }
                popover.innerHTML = popoverHtml;
                
                card.addEventListener('click', (e) => {
                    document.querySelectorAll('.stat-popover').forEach(p => {
                        if (p !== popover) p.classList.add('hidden');
                    });
                    popover.classList.toggle('hidden');
                    e.stopPropagation();
                });
                
                // Prevent clicks inside popover from bubbling up to the document and closing it
                popover.addEventListener('click', (e) => e.stopPropagation());
                
                card.appendChild(popover);
            }
            
            const valDiv = document.createElement('div');
            valDiv.classList.add('stat-value');
            valDiv.textContent = value;
            if (isLargeNumber && String(value).length > 7) {
                valDiv.style.fontSize = '1.8rem';
            } else if (String(value).length > 10) {
                valDiv.style.fontSize = '1.5rem';
            }
            card.appendChild(valDiv);
            
            const labelDiv = document.createElement('div');
            labelDiv.classList.add('stat-label');
            labelDiv.textContent = label;
            card.appendChild(labelDiv);
            
            statsContainer.appendChild(card);
        }

        function renderTable() {
            tableHeadRow.innerHTML = '';
            tableBody.innerHTML = '';
            
            const categoryFilter = document.getElementById('dashboard-category-filter') ? document.getElementById('dashboard-category-filter').value : '전체';
            const statusFilter = document.getElementById('dashboard-status-filter') ? document.getElementById('dashboard-status-filter').value : '전체';
            const allFields = getAllUniqueFields(categoryFilter);
            const all = [{id: 'category', label: '메이커 구분'}, {id: 'status', label: '선정 상태'}, ...allFields];
            const activeFields = all.filter(f => f.id === 'status' || visibleColumns.has(f.id));
            
            activeFields.forEach(f => {
                const th = document.createElement('th');
                let indicator = '';
                if (currentSortColumn === f.id) {
                    indicator = currentSortDirection === 'asc' ? ' ▲' : ' ▼';
                }
                th.textContent = f.label + indicator;
                th.addEventListener('click', () => {
                    if (currentSortColumn === f.id) {
                        currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        currentSortColumn = f.id;
                        currentSortDirection = 'asc';
                    }
                    renderTable();
                });
                tableHeadRow.appendChild(th);
            });
            
            let displayRegs = registrations;
            if (categoryFilter !== '전체') {
                displayRegs = displayRegs.filter(r => r.category === categoryFilter);
            }
            if (statusFilter !== '전체') {
                displayRegs = displayRegs.filter(r => (r.status || '미정') === statusFilter);
            }
            const greemerFilterCheck = document.getElementById('dashboard-greemer-filter');
            if (greemerFilterCheck && greemerFilterCheck.checked) {
                displayRegs = displayRegs.filter(r => r.greemerCast === 'Y');
            }
            
            displayRegs.sort((a, b) => {
                let valA = a[currentSortColumn] || '';
                let valB = b[currentSortColumn] || '';
                if (currentSortColumn === 'status') {
                    valA = a.status || '미정';
                    valB = b.status || '미정';
                }
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return currentSortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return currentSortDirection === 'asc' ? 1 : -1;
                return 0;
            });
            
            displayRegs.forEach(reg => {
                const tr = document.createElement('tr');
                tr.addEventListener('click', () => openEditModal(reg));
                activeFields.forEach(f => {
                    const td = document.createElement('td');
                    let content = reg[f.id];
                    let rawContent = content; // for tooltip
                    
                    if (f.id === 'status') {
                        content = reg.status || '미정';
                        rawContent = content;
                    } else {
                        if (f.type === 'number' && content !== undefined && content !== null && content !== '') {
                            content = formatNumber(content);
                        } else if (content === undefined || content === null || content === '') {
                            content = '-';
                        }
                    }
                    td.textContent = content;
                    td.title = rawContent || '';
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
        }

        // --- Edit Registration Modal ---
        let currentEditingId = null;

        function openEditModal(reg) {
            currentEditingId = reg.id;
            const modal = document.getElementById('edit-modal');
            const container = document.getElementById('edit-fields-container');
            const statusSelect = document.getElementById('edit-status-select');
            
            statusSelect.value = reg.status || '미정';
            container.innerHTML = '';
            
            const schema = SCHEMAS[reg.category] || [];
            const filteredCustomFields = customFields.filter(f => !f.targetCategory || f.targetCategory === '모든 구분' || f.targetCategory === reg.category);
            const allFields = [...schema, ...filteredCustomFields];
            
            allFields.forEach(f => {
                const div = document.createElement('div');
                div.className = 'input-group';
                const label = document.createElement('label');
                label.textContent = f.label;
                div.appendChild(label);
                
                let input;
                if (f.type === 'textarea') {
                    input = document.createElement('textarea');
                    input.rows = 3;
                } else if (f.type === 'select') {
                    input = document.createElement('select');
                    if (f.options) {
                        f.options.forEach(opt => {
                            const option = document.createElement('option');
                            option.value = opt;
                            option.textContent = opt;
                            input.appendChild(option);
                        });
                    }
                } else if (f.type === 'checkbox') {
                    input = document.createElement('input');
                    input.type = 'checkbox';
                    input.checked = reg[f.id] === 'Y';
                    div.style.flexDirection = 'row';
                    div.style.alignItems = 'center';
                } else {
                    input = document.createElement('input');
                    input.type = f.type || 'text';
                }
                input.id = `edit-field-${f.id}`;
                if (f.type !== 'checkbox') {
                    input.value = reg[f.id] || '';
                }
                div.appendChild(input);
                container.appendChild(div);
            });
            
            modal.classList.remove('hidden');
        }

        document.getElementById('btn-cancel-edit').addEventListener('click', () => {
            document.getElementById('edit-modal').classList.add('hidden');
        });

        document.getElementById('btn-delete-registration').addEventListener('click', async () => {
            if (confirm('정말로 이 데이터를 삭제하시겠습니까?')) {
                await deleteRegistration(currentEditingId);
                document.getElementById('edit-modal').classList.add('hidden');
                await refreshDashboard();
            }
        });

        document.getElementById('btn-save-edit').addEventListener('click', async () => {
            const status = document.getElementById('edit-status-select').value;
            const reg = registrations.find(r => r.id === currentEditingId);
            if (!reg) return;
            
            const updatedData = { status };
            
            const schema = SCHEMAS[reg.category] || [];
            const filteredCustomFields = customFields.filter(f => !f.targetCategory || f.targetCategory === '모든 구분' || f.targetCategory === reg.category);
            const allFields = [...schema, ...filteredCustomFields];
            
            allFields.forEach(f => {
                const input = document.getElementById(`edit-field-${f.id}`);
                if (input) {
                    let val = input.value;
                    if (f.type === 'checkbox') {
                        val = input.checked ? 'Y' : 'N';
                    } else if (f.type === 'number' && val) {
                        val = parseInt(val, 10);
                    }
                    updatedData[f.id] = val;
                }
            });
            
            const saveBtn = document.getElementById('btn-save-edit');
            const originalText = saveBtn.textContent;
            saveBtn.textContent = '저장 중...';
            saveBtn.disabled = true;
            
            try {
                await updateRegistration(currentEditingId, updatedData);
                document.getElementById('edit-modal').classList.add('hidden');
                await refreshDashboard();
            } catch (error) {
                console.error(error);
                alert('수정에 실패했습니다.');
            } finally {
                saveBtn.textContent = originalText;
                saveBtn.disabled = false;
            }
        });

        // Global click to close popovers
        document.addEventListener('click', () => {
            document.querySelectorAll('.stat-popover').forEach(p => p.classList.add('hidden'));
        });

        // --- Add Custom Field Modal ---
        btnAddField.addEventListener('click', () => {
            addFieldModal.classList.remove('hidden');
        });

        btnCancelAddField.addEventListener('click', () => {
            addFieldModal.classList.add('hidden');
            document.getElementById('new-field-id').value = '';
            document.getElementById('new-field-name').value = '';
            document.getElementById('new-field-category').value = '모든 구분';
        });

        btnConfirmAddField.addEventListener('click', async () => {
            const targetCategory = document.getElementById('new-field-category').value;
            const idInput = document.getElementById('new-field-id').value.trim();
            const nameInput = document.getElementById('new-field-name').value.trim();
            const typeInput = document.getElementById('new-field-type').value;
            
            if(!idInput || !nameInput) {
                alert('식별자와 항목 이름을 모두 입력해주세요.');
                return;
            }
            
            const newField = { targetCategory: targetCategory, section: '추가 항목', id: idInput, label: nameInput, type: typeInput, required: false };
            customFields.push(newField);
            await saveCustomFields(customFields);
            
            visibleColumns.add(idInput);
            if (currentCategory) {
                renderFormFields(currentCategory);
            }
            
            if (!secDashboard.classList.contains('hidden')) {
                await refreshDashboard();
            }
            btnCancelAddField.click();
        });

        // --- Excel Export ---
        const btnExportExcel = document.getElementById('btn-export-excel');
        btnExportExcel.addEventListener('click', () => {
            if (registrations.length === 0) {
                alert('다운로드할 데이터가 없습니다.');
                return;
            }
            
            const categoryFilter = document.getElementById('dashboard-category-filter') ? document.getElementById('dashboard-category-filter').value : '전체';
            const statusFilter = document.getElementById('dashboard-status-filter') ? document.getElementById('dashboard-status-filter').value : '전체';
            const allFields = getAllUniqueFields(categoryFilter);
            
            let displayRegs = registrations;
            if (categoryFilter !== '전체') {
                displayRegs = displayRegs.filter(r => r.category === categoryFilter);
            }
            if (statusFilter !== '전체') {
                displayRegs = displayRegs.filter(r => (r.status || '미정') === statusFilter);
            }

            const activeFields = allFields.filter(f => visibleColumns.has(f.id));
            const headers = ['메이커 구분', '선정 상태', ...activeFields.map(f => f.label)];
            const keys = ['category', 'status', ...activeFields.map(f => f.id)];
            
            const dataToExport = displayRegs.map(reg => {
                const row = {};
                keys.forEach((key, index) => {
                    if (key === 'status') {
                        row[headers[index]] = reg[key] || '미정';
                    } else {
                        row[headers[index]] = reg[key] || '';
                    }
                });
                return row;
            });
            
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "신청자목록");
            XLSX.writeFile(wb, "hellomaker_registrations.xlsx");
        });

        // --- Initialization ---
        init();
    </script>
</body>
</html>
